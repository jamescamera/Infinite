<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Infinite Recursion Camera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body { font-family: 'Courier New', monospace; }
  video { display: none; }
  #cv {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  .rec {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    left: 16px;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; letter-spacing: 2px; color: #ff4d4d;
    text-shadow: 0 0 8px rgba(255,77,77,.7);
    z-index: 5;
  }
  .rec .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #ff4d4d;
    animation: blink 1.1s steps(1) infinite;
    box-shadow: 0 0 8px rgba(255,77,77,.9);
  }
  @keyframes blink { 50% { opacity: 0; } }
  .title {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    right: 16px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #7df9ff;
    text-shadow: 0 0 10px rgba(125,249,255,.5);
    z-index: 5;
  }
  .controls {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
    left: 0; right: 0;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    z-index: 5;
    padding: 0 12px;
  }
  button {
    background: rgba(14,14,22,.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(125,249,255,.35);
    color: #7df9ff;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
  }
  button:active { transform: scale(.94); background: rgba(125,249,255,.15); }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(5,5,10,.94);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    z-index: 10; cursor: pointer;
    text-align: center;
    padding: 24px;
  }
  #overlay .icon { font-size: 44px; }
  #overlay p { font-size: 13px; letter-spacing: 2px; color: #7df9ff; line-height: 1.7; }
  #overlay .err { color: #ff8080; font-size: 11px; letter-spacing: 1px; max-width: 320px; line-height: 1.6; }
  #overlay .btn {
    border: 1px solid #7df9ff;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 13px;
    letter-spacing: 2px;
    color: #7df9ff;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>

  <div class="rec"><div class="dot"></div>REC</div>
  <div class="title">⟳ RECURSION CAM</div>

  <div class="controls">
    <button id="camBtn">FLIP CAM</button>
    <button id="zoomBtn">DEPTH: DEEP</button>
    <button id="twistBtn">TWIST: OFF</button>
    <button id="tintBtn">TINT: OFF</button>
  </div>

  <div id="overlay">
    <div class="icon">📹</div>
    <p>TAP TO START THE LOOP</p>
    <div class="btn" id="startBtn">START CAMERA</div>
    <div class="err" id="errMsg"></div>
  </div>

<script>
const vid = document.getElementById('vid');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const errMsg = document.getElementById('errMsg');

let buf = document.createElement('canvas');
let bctx = buf.getContext('2d');

let scale = 0.82;
let twist = 0;
let tint = false;
let facing = 'user';       // 'user' = front, 'environment' = back
let stream = null;
let running = false;
let noCam = false;
let t = 0;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = Math.floor(window.innerWidth * dpr);
  cv.height = Math.floor(window.innerHeight * dpr);
  buf.width = cv.width;
  buf.height = cv.height;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 300));

async function startCamera() {
  errMsg.textContent = '';
  // stop any existing stream
  if (stream) { stream.getTracks().forEach(tr => tr.stop()); stream = null; }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    noCam = true;
    errMsg.textContent = 'CAMERA API UNAVAILABLE IN THIS BROWSER/EMBED — RUNNING SIMULATED FEED. TRY OPENING IN YOUR BROWSER DIRECTLY.';
    beginLoop();
    setTimeout(() => overlay.classList.add('hidden'), 2500);
    return;
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing },
      audio: false
    });
    vid.srcObject = stream;
    await vid.play();
    noCam = false;
    overlay.classList.add('hidden');
    beginLoop();
  } catch (e) {
    // Retry with any camera at all before giving up
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      vid.srcObject = stream;
      await vid.play();
      noCam = false;
      overlay.classList.add('hidden');
      beginLoop();
    } catch (e2) {
      noCam = true;
      errMsg.textContent = 'CAMERA BLOCKED: ' + (e2.name || e2.message) +
        ' — CHECK SITE PERMISSIONS (LOCK ICON IN ADDRESS BAR → PERMISSIONS → CAMERA → ALLOW), THEN TAP START AGAIN. RUNNING SIMULATED FEED MEANWHILE.';
      beginLoop();
    }
  }
}

function beginLoop() {
  if (!running) { running = true; requestAnimationFrame(draw); }
}

document.getElementById('startBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  startCamera();
});
overlay.addEventListener('click', startCamera);

function drawBase() {
  if (!noCam && vid.videoWidth) {
    const vr = vid.videoWidth / vid.videoHeight;
    const cr = cv.width / cv.height;
    let dw, dh;
    if (vr > cr) { dh = cv.height; dw = dh * vr; }
    else { dw = cv.width; dh = dw / vr; }
    ctx.save();
    if (facing === 'user') { ctx.translate(cv.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(vid, (cv.width - dw) / 2, (cv.height - dh) / 2, dw, dh);
    ctx.restore();
  } else {
    const g = ctx.createLinearGradient(0, 0, cv.width, cv.height);
    g.addColorStop(0, `hsl(${(t * 20) % 360}, 70%, 20%)`);
    g.addColorStop(1, `hsl(${(t * 20 + 120) % 360}, 70%, 35%)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
}

function draw() {
  t += 0.016;
  drawBase();

  // feedback: previous composite drawn back inside itself
  ctx.save();
  ctx.translate(cv.width / 2, cv.height / 2);
  if (twist) ctx.rotate(twist);
  ctx.scale(scale, scale);
  ctx.translate(-cv.width / 2, -cv.height / 2);
  if (tint) {
    ctx.globalAlpha = 0.96;
    ctx.filter = 'hue-rotate(18deg) saturate(1.15)';
  }
  ctx.drawImage(buf, 0, 0);
  ctx.filter = 'none';
  ctx.globalAlpha = 1;

  // bezel so each level reads as a phone screen
  ctx.strokeStyle = 'rgba(15,15,25,.9)';
  ctx.lineWidth = Math.max(10, cv.width * 0.02);
  ctx.strokeRect(ctx.lineWidth / 2, ctx.lineWidth / 2, cv.width - ctx.lineWidth, cv.height - ctx.lineWidth);
  ctx.restore();

  // scanlines
  ctx.fillStyle = 'rgba(0,0,0,.05)';
  for (let y = 0; y < cv.height; y += 6) ctx.fillRect(0, y, cv.width, 1);

  bctx.clearRect(0, 0, buf.width, buf.height);
  bctx.drawImage(cv, 0, 0);

  requestAnimationFrame(draw);
}

// controls
document.getElementById('camBtn').onclick = () => {
  facing = facing === 'user' ? 'environment' : 'user';
  if (!overlay.classList.contains('hidden') === false) startCamera();
  else startCamera();
};

const zoomBtn = document.getElementById('zoomBtn');
const zoomModes = [
  { label: 'DEPTH: DEEP', s: 0.82 },
  { label: 'DEPTH: ABYSS', s: 0.9 },
  { label: 'DEPTH: SHALLOW', s: 0.65 }
];
let zi = 0;
zoomBtn.onclick = () => {
  zi = (zi + 1) % zoomModes.length;
  scale = zoomModes[zi].s;
  zoomBtn.textContent = zoomModes[zi].label;
};

const twistBtn = document.getElementById('twistBtn');
const twistModes = [
  { label: 'TWIST: OFF', r: 0 },
  { label: 'TWIST: GENTLE', r: 0.05 },
  { label: 'TWIST: VORTEX', r: 0.15 }
];
let ti = 0;
twistBtn.onclick = () => {
  ti = (ti + 1) % twistModes.length;
  twist = twistModes[ti].r;
  twistBtn.textContent = twistModes[ti].label;
};

const tintBtn = document.getElementById('tintBtn');
tintBtn.onclick = () => {
  tint = !tint;
  tintBtn.textContent = tint ? 'TINT: RAINBOW' : 'TINT: OFF';
};
</script>
</body>
</html>
