<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Infinite Recursion Camera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body { font-family: 'Courier New', monospace; }
  video { display: none; }
  #cv { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; touch-action: none; }
  .title {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    right: 16px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #7df9ff;
    text-shadow: 0 0 10px rgba(125,249,255,.5);
    z-index: 5;
    pointer-events: none;
  }
  #recBadge {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    left: 16px;
    display: none;
    align-items: center; gap: 6px;
    font-size: 12px; letter-spacing: 2px; color: #ff4d4d;
    z-index: 5;
    pointer-events: none;
  }
  #recBadge .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #ff4d4d;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #bootMsg {
    position: fixed;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px;
    letter-spacing: 4px;
    color: #7df9ff;
    text-shadow: 0 0 14px rgba(125,249,255,.8);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s;
  }
  .bar {
    position: fixed;
    left: 0; right: 0;
    display: flex;
    gap: 7px;
    justify-content: center;
    flex-wrap: wrap;
    z-index: 5;
    padding: 0 10px;
  }
  #mainBar { bottom: calc(env(safe-area-inset-bottom, 0px) + 14px); }
  #panel {
    position: fixed;
    left: 10px; right: 10px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 74px);
    background: rgba(10,10,18,.92);
    border: 1px solid rgba(125,249,255,.25);
    border-radius: 18px;
    padding: 14px;
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    z-index: 5;
    max-height: 55vh;
    overflow-y: auto;
  }
  #panel.open { display: flex; }
  button {
    background: rgba(14,14,22,.85);
    border: 1.5px solid #7df9ff;
    color: #7df9ff;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 11px 13px;
    border-radius: 999px;
    cursor: pointer;
  }
  button:active { transform: scale(.9); }
  .b-shot { border-color: #ffffff; color: #ffffff; font-size: 15px; padding: 9px 15px; }
  .b-clip { border-color: #ff5d7a; color: #ff5d7a; font-size: 13px; }
  .b-clip.recording { animation: pulse .9s infinite; }
  @keyframes pulse { 50% { box-shadow: 0 0 22px #ff5d7a; } }
  .b-len  { border-color: #ff9d5c; color: #ff9d5c; }
  .b-mic  { border-color: #ffd75c; color: #ffd75c; }
  .b-flip { border-color: #7dffb0; color: #7dffb0; }
  .b-mode { border-color: #c07dff; color: #c07dff; }
  .b-screens { border-color: #7dffb0; color: #7dffb0; }
  .b-delay { border-color: #ff9d5c; color: #ff9d5c; }
  .b-twist { border-color: #c07dff; color: #c07dff; }
  .b-tint { border-color: #ff5d7a; color: #ff5d7a; }
  .b-bezel { border-color: #ffd75c; color: #ffd75c; }
  .b-shape { border-color: #ff7dde; color: #ff7dde; }
  .b-dir { border-color: #9dff5c; color: #9dff5c; }
  .sliderRow {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #7df9ff;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .sliderRow label { min-width: 74px; }
  .sliderRow output { min-width: 30px; text-align: right; }
  input[type=range] { flex: 1; accent-color: #7df9ff; height: 26px; }
  #toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 78px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(14,14,22,.9);
    border: 1px solid rgba(125,249,255,.4);
    color: #7df9ff;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 10px 16px;
    border-radius: 10px;
    z-index: 7;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    text-align: center;
  }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(5,5,10,.96);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    z-index: 10; cursor: pointer;
    text-align: center;
    padding: 24px;
  }
  #overlay .icon { font-size: 44px; }
  #overlay p { font-size: 13px; letter-spacing: 2px; color: #7df9ff; line-height: 1.7; }
  #overlay .err { color: #ff8080; font-size: 11px; letter-spacing: 1px; max-width: 320px; line-height: 1.6; }
  #overlay .btn {
    border: 1px solid #7df9ff;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 13px;
    letter-spacing: 2px;
    color: #7df9ff;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>

  <div class="title" id="titleTag">&#10227; RECURSION CAM v4</div>
  <div id="recBadge"><div class="dot"></div>CLIP</div>
  <div id="bootMsg"></div>
  <div id="toast"></div>

  <div class="bar" id="mainBar">
    <button class="b-shot" id="shotBtn">&#128248;</button>
    <button class="b-clip" id="clipBtn">&#9210; 5s</button>
    <button class="b-len" id="lenBtn">LEN 5s</button>
    <button class="b-mic" id="micBtn">&#127908; OFF</button>
    <button class="b-flip" id="camBtn">FLIP</button>
    <button class="b-mode" id="modeBtn">LOOP</button>
    <button id="gearBtn">&#9881;</button>
  </div>

  <div id="panel">
    <div class="sliderRow">
      <label>LOOPS</label>
      <input type="range" id="loopsSlider" min="2" max="13" step="1" value="13">
      <output id="loopsOut">&#8734;</output>
    </div>
    <div class="sliderRow">
      <label>DEPTH</label>
      <input type="range" id="depthSlider" min="55" max="92" step="1" value="82">
      <output id="depthOut">82</output>
    </div>
    <button class="b-dir" id="dirBtn">DIR: IN</button>
    <button class="b-shape" id="shapeBtn">SHAPE: RECT</button>
    <button class="b-screens" id="screensBtn">SCREENS: 1</button>
    <button class="b-delay" id="delayBtn">DELAY: SYNC</button>
    <button class="b-twist" id="twistBtn">TWIST: OFF</button>
    <button class="b-tint" id="tintBtn">TINT: OFF</button>
    <button class="b-bezel" id="bezelBtn">BEZEL: NONE</button>
    <button class="b-fx" id="fxBtn">FX: OFF</button>
  </div>

  <div id="overlay">
    <div class="icon">&#128249;</div>
    <p>TAP TO START THE LOOP<br><span style="font-size:10px;color:#55c8d8">DRAG THE SCREEN TO MOVE THE TUNNEL</span></p>
    <div class="btn" id="startBtn">START CAMERA</div>
    <div class="err" id="errMsg"></div>
  </div>

<script>
window.onerror = function (msg, src, line) {
  var box = document.getElementById('errBox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'errBox';
    box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99;background:#7a1020;color:#fff;font:11px Courier New;padding:10px 14px;letter-spacing:1px;';
    document.body.appendChild(box);
  }
  box.textContent = 'JS ERROR (line ' + line + '): ' + msg;
};

var vid = document.getElementById('vid');
var cv = document.getElementById('cv');
var ctx = cv.getContext('2d');
var overlay = document.getElementById('overlay');
var errMsg = document.getElementById('errMsg');
var toast = document.getElementById('toast');
var recBadge = document.getElementById('recBadge');
var bootMsg = document.getElementById('bootMsg');
var clipBtn = document.getElementById('clipBtn');

var scale = 0.82;
var twist = 0;
var tint = false;
var facing = 'user';
var stream = null;
var micStream = null;
var running = false;
var noCam = false;
var t = 0;
var screens = 1;
var bezel = 1;
var fx = 0;
var delayFrames = 1;
var loops = 13;
var mode = 'loop';
var shape = 'rect';
var dirOut = false;
var soundOn = false;
var recorder = null;
var clipTimer = null;

var RING_SIZE = 14;
var ring = [];
var ringHead = 0;
function makeRing() {
  var maxW = 860;
  var s = Math.min(1, maxW / cv.width);
  ring = [];
  for (var i = 0; i < RING_SIZE; i++) {
    var c = document.createElement('canvas');
    c.width = Math.floor(cv.width * s);
    c.height = Math.floor(cv.height * s);
    ring.push(c);
  }
  ringHead = 0;
}
function pastFrame(framesAgo) {
  var idx = (ringHead - framesAgo + RING_SIZE * 4) % RING_SIZE;
  return ring[idx];
}

var introStart = -1;
var INTRO_MS = 3000;
function playIntro(label) {
  introStart = performance.now();
  if (label) { bootMsg.textContent = label; bootMsg.style.opacity = 1; }
}
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

var cx = 0.5, cy = 0.5;
var tx = 0.5, ty = 0.5;

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = Math.floor(window.innerWidth * dpr);
  cv.height = Math.floor(window.innerHeight * dpr);
  makeRing();
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function () { setTimeout(resize, 300); });

function pointFromEvent(e) {
  var p = e.touches ? e.touches[0] : e;
  tx = p.clientX / window.innerWidth;
  ty = p.clientY / window.innerHeight;
}
var dragging = false;
cv.addEventListener('pointerdown', function (e) { dragging = true; pointFromEvent(e); });
cv.addEventListener('pointermove', function (e) { if (dragging) pointFromEvent(e); });
window.addEventListener('pointerup', function () { dragging = false; });
cv.addEventListener('touchstart', function (e) { dragging = true; pointFromEvent(e); e.preventDefault(); }, { passive: false });
cv.addEventListener('touchmove', function (e) { if (dragging) { pointFromEvent(e); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchend', function () { dragging = false; });

function startCamera() {
  errMsg.textContent = '';
  if (stream) { stream.getTracks().forEach(function (tr) { tr.stop(); }); stream = null; }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    noCam = true;
    errMsg.textContent = 'CAMERA API UNAVAILABLE - RUNNING SIMULATED FEED.';
    playIntro('INITIALISING LOOP');
    beginLoop();
    setTimeout(function () { overlay.classList.add('hidden'); }, 2000);
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: false })
    .then(function (s) {
      stream = s;
      vid.srcObject = s;
      return vid.play();
    })
    .then(function () {
      noCam = false;
      overlay.classList.add('hidden');
      playIntro('INITIALISING LOOP');
      beginLoop();
    })
    .catch(function () {
      navigator.mediaDevices.getUserMedia({ video: true, audio: false })
        .then(function (s) {
          stream = s;
          vid.srcObject = s;
          return vid.play();
        })
        .then(function () {
          noCam = false;
          overlay.classList.add('hidden');
          playIntro('INITIALISING LOOP');
          beginLoop();
        })
        .catch(function (e2) {
          noCam = true;
          errMsg.textContent = 'CAMERA BLOCKED: ' + (e2.name || e2.message) + ' - ALLOW CAMERA IN SITE PERMISSIONS, THEN TAP START AGAIN.';
          playIntro('INITIALISING LOOP');
          beginLoop();
        });
    });
}
function beginLoop() {
  if (!running) { running = true; requestAnimationFrame(draw); }
}
var startBtn = document.getElementById('startBtn');
startBtn.addEventListener('click', function (e) { e.stopPropagation(); startCamera(); });
startBtn.addEventListener('touchend', function (e) { e.stopPropagation(); e.preventDefault(); startCamera(); });
overlay.addEventListener('click', startCamera);
overlay.addEventListener('touchend', function (e) { e.preventDefault(); startCamera(); });

// script-loaded confirmation: if you can see the check mark, JS is alive
document.getElementById('titleTag').textContent = '\u27F3 RECURSION CAM v4 \u2713';

function drawBase() {
  if (!noCam && vid.videoWidth) {
    var vr = vid.videoWidth / vid.videoHeight;
    var cr = cv.width / cv.height;
    var dw, dh;
    if (vr > cr) { dh = cv.height; dw = dh * vr; }
    else { dw = cv.width; dh = dw / vr; }
    ctx.save();
    if (fx === 1 && mode === 'loop') ctx.globalAlpha = 0.35;
    if (facing === 'user') { ctx.translate(cv.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(vid, (cv.width - dw) / 2, (cv.height - dh) / 2, dw, dh);
    ctx.restore();
    ctx.globalAlpha = 1;
  } else {
    var g = ctx.createLinearGradient(0, 0, cv.width, cv.height);
    g.addColorStop(0, 'hsl(' + ((t * 20) % 360) + ', 70%, 20%)');
    g.addColorStop(1, 'hsl(' + ((t * 20 + 120) % 360) + ', 70%, 35%)');
    ctx.fillStyle = g;
    if (fx === 1 && mode === 'loop') ctx.globalAlpha = 0.35;
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.globalAlpha = 1;
  }
}

function strokeBezel() {
  if (bezel === 1) return;
  var lw = Math.max(10, cv.width * 0.02);
  if (bezel === 0) { ctx.strokeStyle = 'rgba(15,15,25,.9)'; ctx.shadowBlur = 0; }
  else if (bezel === 2) { ctx.strokeStyle = 'rgba(125,249,255,.9)'; ctx.shadowColor = '#7df9ff'; ctx.shadowBlur = lw * 1.2; }
  else { ctx.strokeStyle = 'hsl(' + ((t * 80) % 360) + ', 100%, 60%)'; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = lw; }
  ctx.lineWidth = bezel === 0 ? lw : lw * 0.6;
  if (shape === 'circle') {
    ctx.beginPath();
    ctx.ellipse(cv.width / 2, cv.height / 2, cv.width / 2 - ctx.lineWidth / 2, cv.height / 2 - ctx.lineWidth / 2, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    ctx.strokeRect(ctx.lineWidth / 2, ctx.lineWidth / 2, cv.width - ctx.lineWidth, cv.height - ctx.lineWidth);
  }
  ctx.shadowBlur = 0;
}

function drawFeedbackAt(px, py, s, rot) {
  var src = pastFrame(delayFrames);
  ctx.save();
  ctx.translate(px, py);
  if (rot) ctx.rotate(rot);
  ctx.scale(s, s);
  ctx.translate(-cv.width / 2, -cv.height / 2);
  if (shape === 'circle') {
    ctx.beginPath();
    ctx.ellipse(cv.width / 2, cv.height / 2, cv.width / 2, cv.height / 2, 0, 0, Math.PI * 2);
    ctx.clip();
  }
  var a = 1;
  if (loops < 13) a = Math.pow(0.05, 1 / loops);
  if (tint) { ctx.filter = 'hue-rotate(18deg) saturate(1.15)'; a = Math.min(a, 0.96); }
  ctx.globalAlpha = a;
  ctx.drawImage(src, 0, 0, src.width, src.height, 0, 0, cv.width, cv.height);
  ctx.filter = 'none';
  ctx.globalAlpha = 1;
  strokeBezel();
  ctx.restore();
}

function applyGlitch() {
  if (Math.sin(t * 2.7) > 0.93) {
    var bands = 4 + Math.floor(Math.random() * 4);
    for (var i = 0; i < bands; i++) {
      var y = Math.random() * cv.height;
      var h = 6 + Math.random() * 30;
      var off = (Math.random() - 0.5) * cv.width * 0.12;
      var slice = ctx.getImageData(0, y, cv.width, h);
      ctx.putImageData(slice, off, y);
    }
  }
}

function draw() {
  t += 0.016;
  cx += (tx - cx) * 0.12;
  cy += (ty - cy) * 0.12;

  var effScale = scale;
  if (introStart > 0) {
    var p = Math.min(1, (performance.now() - introStart) / INTRO_MS);
    effScale = scale * easeOutCubic(p);
    var level = Math.floor(p * 12);
    bootMsg.textContent = p < 1 ? 'LOOP DEPTH ' + (level < 10 ? '0' + level : level) : '';
    if (p >= 1) { introStart = -1; bootMsg.style.opacity = 0; }
  }
  if (dirOut) effScale = 1 / Math.max(0.4, effScale);

  drawBase();

  if (mode === 'loop') {
    var px = cx * cv.width;
    var py = cy * cv.height;
    if (screens === 1) {
      drawFeedbackAt(px, py, effScale, twist);
    } else if (screens === 2) {
      drawFeedbackAt(px, py, effScale * (dirOut ? 1 : 0.8), twist);
      drawFeedbackAt(cv.width - px, cv.height - py, effScale * (dirOut ? 1 : 0.8), -twist);
    } else {
      var r = Math.min(cv.width, cv.height) * 0.22;
      for (var i = 0; i < 3; i++) {
        var ang = t * 0.4 + (i * Math.PI * 2) / 3;
        drawFeedbackAt(px + Math.cos(ang) * r, py + Math.sin(ang) * r, effScale * (dirOut ? 1 : 0.62), twist + ang * 0.1);
      }
    }
    if (fx === 2) applyGlitch();
    ctx.fillStyle = 'rgba(0,0,0,.05)';
    for (var y2 = 0; y2 < cv.height; y2 += 6) ctx.fillRect(0, y2, cv.width, 1);
  }

  ringHead = (ringHead + 1) % RING_SIZE;
  var dst = ring[ringHead];
  var dctx = dst.getContext('2d');
  dctx.clearRect(0, 0, dst.width, dst.height);
  dctx.drawImage(cv, 0, 0, cv.width, cv.height, 0, 0, dst.width, dst.height);

  requestAnimationFrame(draw);
}

function showToast(msg, ms) {
  toast.textContent = msg;
  toast.style.opacity = 1;
  clearTimeout(toast._t);
  toast._t = setTimeout(function () { toast.style.opacity = 0; }, ms || 2200);
}
function download(blob, name) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}

document.getElementById('shotBtn').onclick = function () {
  cv.toBlob(function (b) {
    if (b) { download(b, 'recursion-' + Date.now() + '.png'); showToast('SNAP SAVED'); }
  }, 'image/png');
};

var lenModes = [5, 15, 30, 0];
var li = 0;
var lenBtn = document.getElementById('lenBtn');
lenBtn.onclick = function () {
  li = (li + 1) % lenModes.length;
  lenBtn.textContent = 'LEN ' + (lenModes[li] === 0 ? 'MANUAL' : lenModes[li] + 's');
  if (!recorder) clipBtn.innerHTML = '&#9210; ' + (lenModes[li] === 0 ? 'REC' : lenModes[li] + 's');
};

var micBtn = document.getElementById('micBtn');
micBtn.onclick = function () {
  if (!soundOn) {
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(function (s) {
        micStream = s;
        soundOn = true;
        micBtn.innerHTML = '&#127908; ON';
        showToast('MIC READY - CLIPS WILL HAVE SOUND');
      })
      .catch(function () { showToast('MIC BLOCKED - ALLOW IN PERMISSIONS'); });
  } else {
    if (micStream) { micStream.getTracks().forEach(function (tr) { tr.stop(); }); micStream = null; }
    soundOn = false;
    micBtn.innerHTML = '&#127908; OFF';
  }
};

clipBtn.onclick = function () {
  if (recorder && recorder.state === 'recording') {
    if (lenModes[li] === 0) { recorder.stop(); if (clipTimer) clearInterval(clipTimer); }
    return;
  }
  if (!cv.captureStream || !window.MediaRecorder) {
    showToast('RECORDING NOT SUPPORTED - USE SCREEN RECORD');
    return;
  }
  var cs = cv.captureStream(30);
  if (soundOn && micStream) {
    micStream.getAudioTracks().forEach(function (tr) { cs.addTrack(tr); });
  }
  // pick a mime type this browser actually supports (Safari = mp4, Chrome = webm)
  var mime = '';
  var candidates = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp9', 'video/webm', 'video/mp4'];
  if (MediaRecorder.isTypeSupported) {
    for (var mi = 0; mi < candidates.length; mi++) {
      if (MediaRecorder.isTypeSupported(candidates[mi])) { mime = candidates[mi]; break; }
    }
  }
  var chunks = [];
  try {
    recorder = mime
      ? new MediaRecorder(cs, { mimeType: mime, videoBitsPerSecond: 5000000 })
      : new MediaRecorder(cs);
  } catch (recErr) {
    try { recorder = new MediaRecorder(cs); }
    catch (recErr2) { recorder = null; showToast('RECORDING NOT SUPPORTED ON THIS DEVICE - USE SCREEN RECORD'); return; }
  }
  var ext = (recorder.mimeType && recorder.mimeType.indexOf('mp4') > -1) ? 'mp4' : 'webm';
  recorder.ondataavailable = function (e) { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = function () {
    download(new Blob(chunks, { type: 'video/' + ext }), 'recursion-' + Date.now() + '.' + ext);
    showToast('CLIP SAVED' + (soundOn ? ' (WITH SOUND)' : ''));
    recorder = null;
    clipBtn.classList.remove('recording');
    clipBtn.innerHTML = '&#9210; ' + (lenModes[li] === 0 ? 'REC' : lenModes[li] + 's');
    recBadge.style.display = 'none';
  };
  recorder.start();
  clipBtn.classList.add('recording');
  recBadge.style.display = 'flex';
  var total = lenModes[li];
  if (total === 0) {
    clipBtn.textContent = 'STOP';
  } else {
    var left = total;
    clipBtn.innerHTML = '&#9210; ' + left;
    clipTimer = setInterval(function () {
      left--;
      if (left > 0) clipBtn.innerHTML = '&#9210; ' + left;
      else { clearInterval(clipTimer); if (recorder && recorder.state === 'recording') recorder.stop(); }
    }, 1000);
  }
};

document.getElementById('camBtn').onclick = function () {
  facing = facing === 'user' ? 'environment' : 'user';
  startCamera();
};

var modeBtn = document.getElementById('modeBtn');
modeBtn.onclick = function () {
  mode = mode === 'loop' ? 'plain' : 'loop';
  modeBtn.textContent = mode === 'loop' ? 'LOOP' : 'PLAIN';
  showToast(mode === 'loop' ? 'RECURSION ON' : 'NORMAL CAMERA MODE');
  if (mode === 'loop') playIntro('LOOP RESTORED');
};

var panel = document.getElementById('panel');
document.getElementById('gearBtn').onclick = function () { panel.classList.toggle('open'); };

var loopsSlider = document.getElementById('loopsSlider');
var loopsOut = document.getElementById('loopsOut');
loopsSlider.oninput = function () {
  loops = parseInt(loopsSlider.value, 10);
  loopsOut.innerHTML = loops >= 13 ? '&#8734;' : loops;
};

var depthSlider = document.getElementById('depthSlider');
var depthOut = document.getElementById('depthOut');
depthSlider.oninput = function () {
  scale = parseInt(depthSlider.value, 10) / 100;
  depthOut.textContent = depthSlider.value;
};

var dirBtn = document.getElementById('dirBtn');
dirBtn.onclick = function () {
  dirOut = !dirOut;
  dirBtn.textContent = dirOut ? 'DIR: OUT' : 'DIR: IN';
  playIntro(dirOut ? 'REVERSING LOOP' : 'TUNNEL MODE');
};

var shapeBtn = document.getElementById('shapeBtn');
shapeBtn.onclick = function () {
  shape = shape === 'rect' ? 'circle' : 'rect';
  shapeBtn.textContent = shape === 'rect' ? 'SHAPE: RECT' : 'SHAPE: CIRCLE';
};

var screensBtn = document.getElementById('screensBtn');
screensBtn.onclick = function () {
  screens = screens === 1 ? 2 : screens === 2 ? 3 : 1;
  screensBtn.textContent = 'SCREENS: ' + screens;
  playIntro('SCREENS x ' + screens);
};

var delayBtn = document.getElementById('delayBtn');
var delayModes = [
  { label: 'DELAY: SYNC', f: 1 },
  { label: 'DELAY: LAG', f: 5 },
  { label: 'DELAY: TIMEWARP', f: 12 }
];
var di = 0;
delayBtn.onclick = function () {
  di = (di + 1) % delayModes.length;
  delayFrames = delayModes[di].f;
  delayBtn.textContent = delayModes[di].label;
};

var twistBtn = document.getElementById('twistBtn');
var twistModes = [
  { label: 'TWIST: OFF', r: 0 },
  { label: 'TWIST: GENTLE', r: 0.05 },
  { label: 'TWIST: VORTEX', r: 0.15 }
];
var ti = 0;
twistBtn.onclick = function () {
  ti = (ti + 1) % twistModes.length;
  twist = twistModes[ti].r;
  twistBtn.textContent = twistModes[ti].label;
};

var tintBtn = document.getElementById('tintBtn');
tintBtn.onclick = function () {
  tint = !tint;
  tintBtn.textContent = tint ? 'TINT: RAINBOW' : 'TINT: OFF';
};

var bezelBtn = document.getElementById('bezelBtn');
var bezelLabels = ['BEZEL: DARK', 'BEZEL: NONE', 'BEZEL: NEON', 'BEZEL: RAINBOW'];
bezelBtn.onclick = function () {
  bezel = (bezel + 1) % 4;
  bezelBtn.textContent = bezelLabels[bezel];
};

var fxBtn = document.getElementById('fxBtn');
var fxLabels = ['FX: OFF', 'FX: ECHO', 'FX: GLITCH'];
fxBtn.onclick = function () {
  fx = (fx + 1) % 3;
  fxBtn.textContent = fxLabels[fx];
};
</script>
</body>
</html>
