<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Recursion Cam 95</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Courier New', monospace;
    background: var(--body, #f3c6cd);
    transition: background .4s;
    display: flex;
    flex-direction: column;
    padding: calc(env(safe-area-inset-top, 0px) + 12px) 14px calc(env(safe-area-inset-bottom, 0px) + 12px);
  }
  video { display: none; }

  #lcd {
    background: #9db89a;
    border-radius: 8px;
    box-shadow: inset 2px 2px 6px rgba(0,0,0,.35), inset -1px -1px 2px rgba(255,255,255,.4);
    color: #26352a;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 8px 12px;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-transform: uppercase;
  }

  #finder {
    flex: 1;
    min-height: 0;
    background: #17171d;
    border-radius: 26px;
    padding: 10px;
    box-shadow:
      8px 8px 20px rgba(0,0,0,.25),
      -6px -6px 16px rgba(255,255,255,.55),
      inset 0 0 0 3px #0a0a0e;
    position: relative;
  }
  #finderInner {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    background: #000;
    box-shadow: inset 0 4px 14px rgba(0,0,0,.9);
  }
  #cv { width: 100%; height: 100%; display: block; touch-action: none; }
  #recDot {
    position: absolute;
    top: 10px; left: 12px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #ff3b30;
    box-shadow: 0 0 10px #ff3b30;
    display: none;
    animation: blink 1s steps(1) infinite;
    z-index: 3;
  }
  @keyframes blink { 50% { opacity: .15; } }
  #bootMsg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #7df9ff;
    font-size: 12px;
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(125,249,255,.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s;
    z-index: 3;
  }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,5,10,.94);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 5;
    text-align: center;
    padding: 20px;
    border-radius: 18px;
    cursor: pointer;
  }
  #overlay .camGlyph {
    width: 46px; height: 46px;
    border: 2px solid #7df9ff;
    border-radius: 12px;
    position: relative;
  }
  #overlay .camGlyph:after {
    content: '';
    position: absolute;
    inset: 9px;
    border: 2px solid #7df9ff;
    border-radius: 50%;
  }
  #overlay p { color: #7df9ff; font-size: 12px; letter-spacing: 2px; line-height: 1.7; }
  #overlay .err { color: #ff8f8f; font-size: 10px; max-width: 300px; line-height: 1.6; letter-spacing: 1px; }
  #overlay .btn {
    border: 1px solid #7df9ff;
    color: #7df9ff;
    padding: 13px 26px;
    border-radius: 12px;
    font-size: 12px;
    letter-spacing: 2px;
  }

  #deck {
    padding-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    z-index: 9;
  }
  .key {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #ffffff, #dcdcdc);
    box-shadow: 5px 5px 12px rgba(0,0,0,.22), -4px -4px 10px rgba(255,255,255,.8);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #5b5b66;
    cursor: pointer;
    transition: box-shadow .08s, transform .08s;
  }
  .key svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .key:active, .key.pressed {
    box-shadow: inset 4px 4px 10px rgba(0,0,0,.25), inset -3px -3px 8px rgba(255,255,255,.7);
    transform: scale(.96);
  }
  .key.on { color: #0c8f6f; }
  #shutter {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 35% 30%, #3a3a44, #101014 70%);
    box-shadow: 6px 6px 16px rgba(0,0,0,.35), -4px -4px 10px rgba(255,255,255,.6), inset 0 0 0 4px #26262e;
    color: #f2f2f6;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .08s, box-shadow .08s;
  }
  #shutter svg { width: 34px; height: 34px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; }
  #shutter:active { transform: scale(.93); box-shadow: inset 5px 5px 14px rgba(0,0,0,.7); }
  #recKey { color: #d23b4e; }
  #recKey svg .dotFill { fill: currentColor; stroke: none; }
  #recKey.recording {
    background: linear-gradient(145deg, #ff6b7d, #d23b4e);
    color: #fff;
    box-shadow: inset 4px 4px 10px rgba(120,10,25,.6), 0 0 18px rgba(255,60,90,.6);
  }

  /* tray sits ABOVE the deck so keys stay usable */
  #tray {
    position: fixed;
    left: 10px; right: 10px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 112px);
    background: linear-gradient(160deg, #fbfbfd, #e3e3ea);
    border-radius: 24px;
    box-shadow: 0 12px 34px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.9);
    padding: 14px 16px 16px;
    z-index: 8;
    transform: translateY(130%) scale(.96);
    opacity: 0;
    pointer-events: none;
    transition: transform .28s cubic-bezier(.2,.9,.3,1.15), opacity .2s;
    max-height: 52vh;
    overflow-y: auto;
  }
  #tray.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
  #tray h3 {
    font-size: 11px;
    letter-spacing: 3px;
    color: #7a7a88;
    text-align: center;
    margin-bottom: 10px;
  }
  .trayGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
    margin-top: 12px;
  }
  .chip {
    border: none;
    border-radius: 14px;
    background: linear-gradient(145deg, #ffffff, #dfdfe6);
    box-shadow: 4px 4px 10px rgba(0,0,0,.15), -3px -3px 8px rgba(255,255,255,.9);
    padding: 10px 4px;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: #55555f;
    text-align: center;
    cursor: pointer;
    line-height: 1.5;
  }
  .chip:active { box-shadow: inset 3px 3px 8px rgba(0,0,0,.2), inset -2px -2px 6px rgba(255,255,255,.8); }
  .chip b { display: block; font-size: 17px; margin-bottom: 2px; font-weight: normal; }
  .chip.on { color: #0c8f6f; }
  .sliderRow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 9px;
    color: #55555f;
    font-size: 10px;
    letter-spacing: 2px;
  }
  .sliderRow label { min-width: 58px; }
  .sliderRow output { min-width: 28px; text-align: right; font-size: 12px; }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 14px;
    border-radius: 8px;
    background: #d5d5de;
    box-shadow: inset 2px 2px 6px rgba(0,0,0,.25), inset -1px -1px 3px rgba(255,255,255,.8);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ffffff, #d8d8e0);
    box-shadow: 3px 3px 8px rgba(0,0,0,.3), -2px -2px 6px rgba(255,255,255,.9), inset 0 0 0 2px rgba(0,0,0,.06);
    cursor: pointer;
  }
  #toast {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 54px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,28,.92);
    color: #7df9ff;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 10px 16px;
    border-radius: 999px;
    z-index: 10;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    text-align: center;
    max-width: 88vw;
  }
</style>
</head>
<body>
  <video id="vid" autoplay playsinline muted></video>

  <div id="lcd">RECURSION CAM 95 &#9679; READY</div>

  <div id="finder">
    <div id="finderInner">
      <canvas id="cv"></canvas>
      <div id="recDot"></div>
      <div id="bootMsg"></div>
      <div id="overlay">
        <div class="camGlyph"></div>
        <p>RECURSION CAM 95<br><span style="font-size:10px;color:#55c8d8">TAP START &#8226; DRAG TO MOVE THE TUNNEL</span></p>
        <div class="btn" id="startBtn">START CAMERA</div>
        <div class="err" id="errMsg"></div>
      </div>
    </div>
  </div>

  <div id="deck">
    <button class="key" id="micKey" aria-label="mic">
      <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"></rect><path d="M5 11a7 7 0 0 0 14 0"></path><path d="M12 18v3"></path></svg>
    </button>
    <button class="key" id="flipKey" aria-label="flip camera">
      <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 0 0-14.5-3.5"></path><path d="M5.5 4v3.5H9"></path><path d="M4 13a8 8 0 0 0 14.5 3.5"></path><path d="M18.5 20v-3.5H15"></path></svg>
    </button>
    <button id="shutter" aria-label="take photo">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9.5"></circle>
        <path d="M12 2.5 L16.7 10.5"></path>
        <path d="M20.4 7.5 L11.4 8.4"></path>
        <path d="M20.4 16.5 L14.9 9.6"></path>
        <path d="M12 21.5 L7.3 13.5"></path>
        <path d="M3.6 16.5 L12.6 15.6"></path>
        <path d="M3.6 7.5 L9.1 14.4"></path>
      </svg>
    </button>
    <button class="key" id="recKey" aria-label="record">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><circle class="dotFill" cx="12" cy="12" r="4.5"></circle></svg>
    </button>
    <button class="key" id="gearKey" aria-label="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1"></path></svg>
    </button>
  </div>

  <div id="tray">
    <h3>&#9670; LOOP LAB &#9670;</h3>
    <div class="sliderRow">
      <label>LOOPS</label>
      <input type="range" id="loopsSlider" min="2" max="13" step="1" value="13">
      <output id="loopsOut">&#8734;</output>
    </div>
    <div class="sliderRow">
      <label>DEPTH</label>
      <input type="range" id="depthSlider" min="55" max="92" step="1" value="82">
      <output id="depthOut">82</output>
    </div>
    <div class="sliderRow">
      <label>TWIST</label>
      <input type="range" id="twistSlider" min="0" max="20" step="1" value="0">
      <output id="twistOut">0</output>
    </div>
    <div class="trayGrid">
      <button class="chip" id="modeChip"><b>&#10227;</b>LOOP</button>
      <button class="chip" id="screensChip"><b>&#9638;</b>SCREENS 1</button>
      <button class="chip" id="delayChip"><b>&#9684;</b>SYNC</button>
      <button class="chip" id="dirChip"><b>&#8644;</b>DIR IN</button>
      <button class="chip" id="shapeChip"><b>&#9645;</b>RECT</button>
      <button class="chip" id="bezelChip"><b>&#9635;</b>NO BEZEL</button>
      <button class="chip" id="tintChip"><b>&#9681;</b>TINT OFF</button>
      <button class="chip" id="fxChip"><b>&#10035;</b>FX OFF</button>
      <button class="chip" id="bodyChip"><b>&#9679;</b>BODY</button>
    </div>
  </div>

  <div id="toast"></div>

<script>
window.onerror = function (msg, src, line) {
  var lcdEl = document.getElementById('lcd');
  if (lcdEl) lcdEl.textContent = 'ERR L' + line + ': ' + msg;
};

var vid = document.getElementById('vid');
var cv = document.getElementById('cv');
var ctx = cv.getContext('2d');
var finderInner = document.getElementById('finderInner');
var overlay = document.getElementById('overlay');
var errMsg = document.getElementById('errMsg');
var toast = document.getElementById('toast');
var recDot = document.getElementById('recDot');
var bootMsg = document.getElementById('bootMsg');
var lcd = document.getElementById('lcd');

var scale = 0.82;
var twist = 0;
var tint = false;
var facing = 'user';
var stream = null;
var micStream = null;
var running = false;
var noCam = false;
var t = 0;
var screens = 1;
var bezel = 1;
var fx = 0;
var delayFrames = 1;
var loops = 13;
var mode = 'loop';
var shape = 'rect';
var dirOut = false;
var soundOn = false;
var recorder = null;

function setLCD(msg) { lcd.textContent = msg; }

var audioCtx = null;
function clickSound(freq) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = freq || 620;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.08);
  } catch (e) {}
}

var RING_SIZE = 14;
var ring = [];
var ringHead = 0;
function makeRing() {
  var maxW = 860;
  var s = Math.min(1, maxW / cv.width);
  ring = [];
  for (var i = 0; i < RING_SIZE; i++) {
    var c = document.createElement('canvas');
    c.width = Math.max(2, Math.floor(cv.width * s));
    c.height = Math.max(2, Math.floor(cv.height * s));
    ring.push(c);
  }
  ringHead = 0;
}
function pastFrame(framesAgo) {
  var idx = (ringHead - framesAgo + RING_SIZE * 4) % RING_SIZE;
  return ring[idx];
}

var introStart = -1;
var INTRO_MS = 3000;
function playIntro(label) {
  introStart = performance.now();
  if (label) { bootMsg.textContent = label; bootMsg.style.opacity = 1; }
}
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

var cx = 0.5, cy = 0.5;
var tx = 0.5, ty = 0.5;

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var rect = finderInner.getBoundingClientRect();
  cv.width = Math.max(2, Math.floor(rect.width * dpr));
  cv.height = Math.max(2, Math.floor(rect.height * dpr));
  makeRing();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function () { setTimeout(resize, 300); });
setTimeout(resize, 50);

function pointFromEvent(e) {
  var p = e.touches ? e.touches[0] : e;
  var rect = finderInner.getBoundingClientRect();
  tx = (p.clientX - rect.left) / rect.width;
  ty = (p.clientY - rect.top) / rect.height;
}
var dragging = false;
cv.addEventListener('pointerdown', function (e) { dragging = true; pointFromEvent(e); });
cv.addEventListener('pointermove', function (e) { if (dragging) pointFromEvent(e); });
window.addEventListener('pointerup', function () { dragging = false; });
cv.addEventListener('touchstart', function (e) { dragging = true; pointFromEvent(e); e.preventDefault(); }, { passive: false });
cv.addEventListener('touchmove', function (e) { if (dragging) { pointFromEvent(e); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchend', function () { dragging = false; });

function startCamera() {
  errMsg.textContent = '';
  resize();
  if (stream) { stream.getTracks().forEach(function (tr) { tr.stop(); }); stream = null; }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    noCam = true;
    errMsg.textContent = 'CAMERA API UNAVAILABLE - RUNNING SIMULATED FEED.';
    playIntro('INITIALISING LOOP');
    beginLoop();
    setTimeout(function () { overlay.style.display = 'none'; }, 2000);
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: false })
    .then(function (s) { stream = s; vid.srcObject = s; return vid.play(); })
    .then(function () {
      noCam = false;
      overlay.style.display = 'none';
      playIntro('INITIALISING LOOP');
      setLCD('RECURSION CAM 95 \u25CF LIVE');
      beginLoop();
    })
    .catch(function () {
      navigator.mediaDevices.getUserMedia({ video: true, audio: false })
        .then(function (s) { stream = s; vid.srcObject = s; return vid.play(); })
        .then(function () {
          noCam = false;
          overlay.style.display = 'none';
          playIntro('INITIALISING LOOP');
          setLCD('RECURSION CAM 95 \u25CF LIVE');
          beginLoop();
        })
        .catch(function (e2) {
          noCam = true;
          errMsg.textContent = 'CAMERA BLOCKED: ' + (e2.name || e2.message) + ' - ALLOW CAMERA IN SITE PERMISSIONS, THEN TAP START AGAIN.';
          playIntro('INITIALISING LOOP');
          beginLoop();
        });
    });
}
function beginLoop() {
  if (!running) { running = true; requestAnimationFrame(draw); }
}
var startBtn = document.getElementById('startBtn');
startBtn.addEventListener('click', function (e) { e.stopPropagation(); clickSound(760); startCamera(); });
overlay.addEventListener('click', function () { clickSound(760); startCamera(); });

function drawBase() {
  if (!noCam && vid.videoWidth) {
    var vr = vid.videoWidth / vid.videoHeight;
    var cr = cv.width / cv.height;
    var dw, dh;
    if (vr > cr) { dh = cv.height; dw = dh * vr; }
    else { dw = cv.width; dh = dw / vr; }
    ctx.save();
    if (fx === 1 && mode === 'loop') ctx.globalAlpha = 0.35;
    if (facing === 'user') { ctx.translate(cv.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(vid, (cv.width - dw) / 2, (cv.height - dh) / 2, dw, dh);
    ctx.restore();
    ctx.globalAlpha = 1;
  } else {
    var g = ctx.createLinearGradient(0, 0, cv.width, cv.height);
    g.addColorStop(0, 'hsl(' + ((t * 20) % 360) + ', 70%, 20%)');
    g.addColorStop(1, 'hsl(' + ((t * 20 + 120) % 360) + ', 70%, 35%)');
    ctx.fillStyle = g;
    if (fx === 1 && mode === 'loop') ctx.globalAlpha = 0.35;
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.globalAlpha = 1;
  }
}

function strokeBezel() {
  if (bezel === 1) return;
  var lw = Math.max(8, cv.width * 0.02);
  if (bezel === 0) { ctx.strokeStyle = 'rgba(15,15,25,.9)'; ctx.shadowBlur = 0; }
  else if (bezel === 2) { ctx.strokeStyle = 'rgba(125,249,255,.9)'; ctx.shadowColor = '#7df9ff'; ctx.shadowBlur = lw * 1.2; }
  else { ctx.strokeStyle = 'hsl(' + ((t * 80) % 360) + ', 100%, 60%)'; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = lw; }
  ctx.lineWidth = bezel === 0 ? lw : lw * 0.6;
  if (shape === 'circle') {
    ctx.beginPath();
    ctx.ellipse(cv.width / 2, cv.height / 2, cv.width / 2 - ctx.lineWidth / 2, cv.height / 2 - ctx.lineWidth / 2, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    ctx.strokeRect(ctx.lineWidth / 2, ctx.lineWidth / 2, cv.width - ctx.lineWidth, cv.height - ctx.lineWidth);
  }
  ctx.shadowBlur = 0;
}

function drawFeedbackAt(px, py, s, rot) {
  var src = pastFrame(delayFrames);
  ctx.save();
  ctx.translate(px, py);
  if (rot) ctx.rotate(rot);
  ctx.scale(s, s);
  ctx.translate(-cv.width / 2, -cv.height / 2);
  if (shape === 'circle') {
    ctx.beginPath();
    ctx.ellipse(cv.width / 2, cv.height / 2, cv.width / 2, cv.height / 2, 0, 0, Math.PI * 2);
    ctx.clip();
  }
  var a = 1;
  if (loops < 13) a = Math.pow(0.05, 1 / loops);
  if (tint) { ctx.filter = 'hue-rotate(18deg) saturate(1.15)'; a = Math.min(a, 0.96); }
  ctx.globalAlpha = a;
  ctx.drawImage(src, 0, 0, src.width, src.height, 0, 0, cv.width, cv.height);
  ctx.filter = 'none';
  ctx.globalAlpha = 1;
  strokeBezel();
  ctx.restore();
}

function applyGlitch() {
  if (Math.sin(t * 2.7) > 0.93) {
    var bands = 4 + Math.floor(Math.random() * 4);
    for (var i = 0; i < bands; i++) {
      var y = Math.random() * cv.height;
      var h = 6 + Math.random() * 30;
      var off = (Math.random() - 0.5) * cv.width * 0.12;
      var slice = ctx.getImageData(0, y, cv.width, h);
      ctx.putImageData(slice, off, y);
    }
  }
}

function draw() {
  t += 0.016;
  cx += (tx - cx) * 0.12;
  cy += (ty - cy) * 0.12;

  var effScale = scale;
  if (introStart > 0) {
    var p = Math.min(1, (performance.now() - introStart) / INTRO_MS);
    effScale = scale * easeOutCubic(p);
    var level = Math.floor(p * 12);
    bootMsg.textContent = p < 1 ? 'LOOP DEPTH ' + (level < 10 ? '0' + level : level) : '';
    if (p >= 1) { introStart = -1; bootMsg.style.opacity = 0; }
  }
  if (dirOut) effScale = 1 / Math.max(0.4, effScale);

  drawBase();

  if (mode === 'loop') {
    var px = cx * cv.width;
    var py = cy * cv.height;
    if (screens === 1) {
      drawFeedbackAt(px, py, effScale, twist);
    } else if (screens === 2) {
      drawFeedbackAt(px, py, effScale * (dirOut ? 1 : 0.8), twist);
      drawFeedbackAt(cv.width - px, cv.height - py, effScale * (dirOut ? 1 : 0.8), -twist);
    } else {
      var r = Math.min(cv.width, cv.height) * 0.22;
      for (var i = 0; i < 3; i++) {
        var ang = t * 0.4 + (i * Math.PI * 2) / 3;
        drawFeedbackAt(px + Math.cos(ang) * r, py + Math.sin(ang) * r, effScale * (dirOut ? 1 : 0.62), twist + ang * 0.1);
      }
    }
    if (fx === 2) applyGlitch();
    ctx.fillStyle = 'rgba(0,0,0,.05)';
    for (var y2 = 0; y2 < cv.height; y2 += 6) ctx.fillRect(0, y2, cv.width, 1);
  }

  ringHead = (ringHead + 1) % RING_SIZE;
  var dst = ring[ringHead];
  if (dst) {
    var dctx = dst.getContext('2d');
    dctx.clearRect(0, 0, dst.width, dst.height);
    dctx.drawImage(cv, 0, 0, cv.width, cv.height, 0, 0, dst.width, dst.height);
  }

  requestAnimationFrame(draw);
}

function showToast(msg, ms) {
  toast.textContent = msg;
  toast.style.opacity = 1;
  clearTimeout(toast._t);
  toast._t = setTimeout(function () { toast.style.opacity = 0; }, ms || 2200);
}
function download(blob, name) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}

document.getElementById('shutter').onclick = function () {
  clickSound(980);
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.fillRect(0, 0, cv.width, cv.height);
  cv.toBlob(function (b) {
    if (b) { download(b, 'recursion-' + Date.now() + '.png'); setLCD('PHOTO SAVED \u25CF NICE'); }
  }, 'image/png');
};

var micKey = document.getElementById('micKey');
function requestMic(onOk) {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function (s) {
      micStream = s;
      soundOn = true;
      micKey.classList.add('on');
      setLCD('MIC ON \u25CF CLIPS WILL HAVE SOUND');
      if (onOk) onOk();
    })
    .catch(function (err) {
      soundOn = false;
      micKey.classList.remove('on');
      showToast('MIC FAILED: ' + (err.name || err.message) + ' - CHECK SITE PERMISSIONS');
      if (onOk) onOk();
    });
}
micKey.onclick = function () {
  clickSound(520);
  if (!soundOn) requestMic();
  else {
    if (micStream) { micStream.getTracks().forEach(function (tr) { tr.stop(); }); micStream = null; }
    soundOn = false;
    micKey.classList.remove('on');
    setLCD('MIC OFF');
  }
};

var recKey = document.getElementById('recKey');
function beginRecording() {
  var cs = cv.captureStream(30);
  if (soundOn && micStream) {
    micStream.getAudioTracks().forEach(function (tr) { cs.addTrack(tr); });
  }
  var mime = '';
  var candidates = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp9', 'video/webm', 'video/mp4'];
  if (MediaRecorder.isTypeSupported) {
    for (var mi = 0; mi < candidates.length; mi++) {
      if (MediaRecorder.isTypeSupported(candidates[mi])) { mime = candidates[mi]; break; }
    }
  }
  var chunks = [];
  try {
    recorder = mime ? new MediaRecorder(cs, { mimeType: mime, videoBitsPerSecond: 5000000 }) : new MediaRecorder(cs);
  } catch (e) {
    try { recorder = new MediaRecorder(cs); }
    catch (e2) { recorder = null; showToast('RECORDING NOT SUPPORTED - USE SCREEN RECORD'); return; }
  }
  var ext = (recorder.mimeType && recorder.mimeType.indexOf('mp4') > -1) ? 'mp4' : 'webm';
  recorder.ondataavailable = function (e) { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = function () {
    download(new Blob(chunks, { type: 'video/' + ext }), 'recursion-' + Date.now() + '.' + ext);
    setLCD('CLIP SAVED' + (soundOn ? ' \u25CF WITH SOUND' : ''));
    recorder = null;
    recKey.classList.remove('recording');
    recDot.style.display = 'none';
  };
  recorder.start();
  recKey.classList.add('recording');
  recDot.style.display = 'block';
  setLCD('RECORDING \u25CF TAP AGAIN TO STOP');
}
recKey.onclick = function () {
  clickSound(440);
  if (recorder && recorder.state === 'recording') { recorder.stop(); return; }
  if (!cv.captureStream || !window.MediaRecorder) {
    showToast('RECORDING NOT SUPPORTED - USE SCREEN RECORD');
    return;
  }
  if (soundOn && !micStream) requestMic(beginRecording);
  else beginRecording();
};

document.getElementById('flipKey').onclick = function () {
  clickSound(680);
  facing = facing === 'user' ? 'environment' : 'user';
  startCamera();
};

var tray = document.getElementById('tray');
var gearKey = document.getElementById('gearKey');
gearKey.onclick = function () {
  clickSound(560);
  tray.classList.toggle('open');
  gearKey.classList.toggle('pressed');
};

var loopsSlider = document.getElementById('loopsSlider');
var loopsOut = document.getElementById('loopsOut');
loopsSlider.oninput = function () {
  loops = parseInt(loopsSlider.value, 10);
  loopsOut.innerHTML = loops >= 13 ? '&#8734;' : loops;
};
var depthSlider = document.getElementById('depthSlider');
var depthOut = document.getElementById('depthOut');
depthSlider.oninput = function () {
  scale = parseInt(depthSlider.value, 10) / 100;
  depthOut.textContent = depthSlider.value;
};
var twistSlider = document.getElementById('twistSlider');
var twistOut = document.getElementById('twistOut');
twistSlider.oninput = function () {
  twist = parseInt(twistSlider.value, 10) / 100;
  twistOut.textContent = twistSlider.value;
};

function chip(id, fn) {
  var el = document.getElementById(id);
  el.onclick = function () { clickSound(600); fn(el); };
  return el;
}

chip('modeChip', function (el) {
  mode = mode === 'loop' ? 'plain' : 'loop';
  el.innerHTML = mode === 'loop' ? '<b>&#10227;</b>LOOP' : '<b>&#9723;</b>PLAIN';
  setLCD(mode === 'loop' ? 'RECURSION ON' : 'NORMAL CAMERA MODE');
  if (mode === 'loop') playIntro('LOOP RESTORED');
});
chip('screensChip', function (el) {
  screens = screens === 1 ? 2 : screens === 2 ? 3 : 1;
  el.innerHTML = '<b>&#9638;</b>SCREENS ' + screens;
  playIntro('SCREENS x ' + screens);
});
var delayModes = [{ n: 'SYNC', f: 1 }, { n: 'LAG', f: 5 }, { n: 'TIMEWARP', f: 12 }];
var di = 0;
chip('delayChip', function (el) {
  di = (di + 1) % delayModes.length;
  delayFrames = delayModes[di].f;
  el.innerHTML = '<b>&#9684;</b>' + delayModes[di].n;
});
chip('dirChip', function (el) {
  dirOut = !dirOut;
  el.innerHTML = '<b>&#8644;</b>' + (dirOut ? 'DIR OUT' : 'DIR IN');
  playIntro(dirOut ? 'REVERSING LOOP' : 'TUNNEL MODE');
});
chip('shapeChip', function (el) {
  shape = shape === 'rect' ? 'circle' : 'rect';
  el.innerHTML = shape === 'rect' ? '<b>&#9645;</b>RECT' : '<b>&#9675;</b>CIRCLE';
});
var bezelNames = ['DARK', 'NO BEZEL', 'NEON', 'RAINBOW'];
chip('bezelChip', function (el) {
  bezel = (bezel + 1) % 4;
  el.innerHTML = '<b>&#9635;</b>' + bezelNames[bezel];
});
chip('tintChip', function (el) {
  tint = !tint;
  el.classList.toggle('on', tint);
  el.innerHTML = '<b>&#9681;</b>' + (tint ? 'TINT ON' : 'TINT OFF');
});
var fxNames = ['FX OFF', 'ECHO', 'GLITCH'];
chip('fxChip', function (el) {
  fx = (fx + 1) % 3;
  el.classList.toggle('on', fx !== 0);
  el.innerHTML = '<b>&#10035;</b>' + fxNames[fx];
});
var bodies = ['#f3c6cd', '#bfe6d2', '#cfd0ee', '#f5e3b8', '#d8d8de'];
var bi = 0;
chip('bodyChip', function () {
  bi = (bi + 1) % bodies.length;
  document.body.style.setProperty('--body', bodies[bi]);
});
</script>
